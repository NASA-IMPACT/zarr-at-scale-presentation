<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1614"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#c93d80"/>
    </marker>
  </defs>

  <!-- LEFT: yearly ERA5 NetCDF files -->
  <g transform="translate(40, 68)">
    <text x="48" y="-22" text-anchor="middle" font-family="'DM Mono', monospace" font-size="13"
          fill="#9a9490" letter-spacing="0.10em">ERA5 ARCHIVE · NetCDF</text>

    <!-- 2010.nc -->
    <g transform="translate(0, 0)">
      <path d="M0 0 L75 0 L95 20 L95 75 L0 75 Z" fill="#dbeafe" stroke="#1d4e8f" stroke-width="2"/>
      <path d="M75 0 L75 20 L95 20" fill="none" stroke="#1d4e8f" stroke-width="2"/>
      <text x="48" y="50" text-anchor="middle" font-family="'DM Mono', monospace" font-size="15" fill="#1d4e8f" font-weight="600">2010.nc</text>
    </g>
    <!-- 2011.nc -->
    <g transform="translate(0, 90)">
      <path d="M0 0 L75 0 L95 20 L95 75 L0 75 Z" fill="#dbeafe" stroke="#1d4e8f" stroke-width="2"/>
      <path d="M75 0 L75 20 L95 20" fill="none" stroke="#1d4e8f" stroke-width="2"/>
      <text x="48" y="50" text-anchor="middle" font-family="'DM Mono', monospace" font-size="15" fill="#1d4e8f" font-weight="600">2011.nc</text>
    </g>
    <!-- 2012.nc -->
    <g transform="translate(0, 180)">
      <path d="M0 0 L75 0 L95 20 L95 75 L0 75 Z" fill="#dbeafe" stroke="#1d4e8f" stroke-width="2"/>
      <path d="M75 0 L75 20 L95 20" fill="none" stroke="#1d4e8f" stroke-width="2"/>
      <text x="48" y="50" text-anchor="middle" font-family="'DM Mono', monospace" font-size="15" fill="#1d4e8f" font-weight="600">2012.nc</text>
    </g>
    <!-- 2013.nc -->
    <g transform="translate(0, 270)">
      <path d="M0 0 L75 0 L95 20 L95 75 L0 75 Z" fill="#dbeafe" stroke="#1d4e8f" stroke-width="2"/>
      <path d="M75 0 L75 20 L95 20" fill="none" stroke="#1d4e8f" stroke-width="2"/>
      <text x="48" y="50" text-anchor="middle" font-family="'DM Mono', monospace" font-size="15" fill="#1d4e8f" font-weight="600">2013.nc</text>
    </g>
  </g>

  <!-- ARROWS: file centers (y=105.5, 195.5, 285.5, 375.5) -> manifest entries -->
  <g stroke="#c93d80" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M150 105 C 240 105, 320 195, 380 215" marker-end="url(#arrow-accent)"/>
    <path d="M150 195 C 240 195, 320 225, 380 235" marker-end="url(#arrow-accent)"/>
    <path d="M150 285 C 240 285, 320 260, 380 252" marker-end="url(#arrow-accent)"/>
    <path d="M150 375 C 240 375, 320 290, 380 270" marker-end="url(#arrow-accent)"/>
  </g>

  <!-- VirtualiZarr+Icechunk action label -->
  <g transform="translate(180, 81)">
    <text x="0" y="0" font-family="'DM Sans', sans-serif" font-size="18"
          fill="#c93d80" font-weight="700" font-style="italic">VirtualiZarr scans</text>
  </g>

  <!-- Icechunk commits label below the arrows -->
  <text x="180" y="408" font-family="'DM Sans', sans-serif" font-size="18"
        fill="#1d4e8f" font-weight="700" font-style="italic">Icechunk commits</text>

  <!-- LIGHTWEIGHT MANIFEST -->
  <g transform="translate(390, 155)">
    <text x="160" y="-12" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11"
          fill="#9a9490" letter-spacing="0.10em">CHUNK MANIFEST · few KB · zstd binary</text>

    <rect x="0" y="0" width="320" height="170" rx="3"
          fill="white" stroke="#dedad4" stroke-width="0.8"/>

    <g font-family="'DM Mono', monospace" font-size="9" fill="#9a9490" letter-spacing="0.04em">
      <text x="14" y="18">INDEX</text>
      <text x="80" y="18">SOURCE</text>
      <text x="240" y="18">RANGE</text>
    </g>
    <line x1="10" y1="24" x2="310" y2="24" stroke="#ececec" stroke-width="0.6"/>

    <g font-family="'DM Mono', monospace" font-size="11" fill="#4a4440">
      <text x="14" y="44">[0,0,0]</text>
      <text x="80" y="44"><tspan fill="#1d4e8f" font-weight="600">era5/2010.nc</tspan></text>
      <text x="240" y="44">0..1.24G</text>

      <text x="14" y="62">[1,0,0]</text>
      <text x="80" y="62"><tspan fill="#1d4e8f" font-weight="600">era5/2011.nc</tspan></text>
      <text x="240" y="62">0..1.24G</text>

      <text x="14" y="80">[2,0,0]</text>
      <text x="80" y="80"><tspan fill="#1d4e8f" font-weight="600">era5/2012.nc</tspan></text>
      <text x="240" y="80">0..1.24G</text>

      <text x="14" y="98">[3,0,0]</text>
      <text x="80" y="98"><tspan fill="#1d4e8f" font-weight="600">era5/2013.nc</tspan></text>
      <text x="240" y="98">0..1.24G</text>

      <text x="14" y="116">[4,0,0]</text>
      <text x="80" y="116"><tspan fill="#1d4e8f" font-weight="600">era5/2014.nc</tspan></text>
      <text x="240" y="116">0..1.24G</text>

      <text x="14" y="134" fill="#9a9490">⋮</text>
    </g>
  </g>

  <!-- ARROW manifest -> datacube -->
  <path d="M715 240 L 770 240" stroke="#1a1614" stroke-width="2" fill="none" marker-end="url(#arrow-ink)"/>

  <!-- ZARR DATACUBE (isometric, chunked, magenta) -->
  <g transform="translate(780, 150)">
    <!-- TOP FACE (light) -->
    <path d="M0 0 L180 0 L250 -70 L70 -70 Z" fill="#f1a8c8" stroke="#952f7c" stroke-width="1.5"/>
    <!-- depth lines on top (parallel to depth axis): connect front-edge subdivisions to back-edge subdivisions -->
    <line x1="60"  y1="0" x2="130" y2="-70" stroke="#952f7c" stroke-width="0.8" opacity="0.55"/>
    <line x1="120" y1="0" x2="190" y2="-70" stroke="#952f7c" stroke-width="0.8" opacity="0.55"/>
    <!-- width lines on top (parallel to front edge): at depth 1/3 and 2/3, spanning the parallelogram's width at that depth -->
    <line x1="23.3" y1="-23.3" x2="203.3" y2="-23.3" stroke="#952f7c" stroke-width="0.8" opacity="0.55"/>
    <line x1="46.7" y1="-46.7" x2="226.7" y2="-46.7" stroke="#952f7c" stroke-width="0.8" opacity="0.55"/>

    <!-- RIGHT FACE (dark) -->
    <path d="M180 0 L250 -70 L250 110 L180 180 Z" fill="#952f7c" stroke="#7a1f64" stroke-width="1.5"/>
    <!-- depth lines on right: vertical subdivisions of right face -->
    <line x1="203.3" y1="-23.3" x2="203.3" y2="156.7" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <line x1="226.7" y1="-46.7" x2="226.7" y2="133.3" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <!-- horizontal-ish lines on right at front-y=60,120 going back: align with front face at y=60, y=120 -->
    <line x1="180" y1="60"  x2="250" y2="-10" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <line x1="180" y1="120" x2="250" y2="50"  stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>

    <!-- FRONT FACE (Zarr accent) -->
    <rect x="0" y="0" width="180" height="180" fill="#c93d80" stroke="#7a1f64" stroke-width="1.5"/>
    <line x1="60"  y1="0" x2="60"  y2="180" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <line x1="0" y1="60"  x2="180" y2="60"  stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>
    <line x1="0" y1="120" x2="180" y2="120" stroke="#7a1f64" stroke-width="0.8" opacity="0.55"/>

    <!-- Z mark -->
    <text x="90" y="115" text-anchor="middle" font-family="'DM Serif Display', serif"
          font-size="92" fill="white" font-weight="400" opacity="0.95">Z</text>
  </g>

  <!-- Caption below cube -->
  <text x="900" y="365" text-anchor="middle" font-family="'DM Sans', sans-serif"
        font-size="14" fill="#1a1614" font-weight="600">one Zarr datacube</text>
  <text x="900" y="385" text-anchor="middle" font-family="'DM Mono', monospace"
        font-size="12" fill="#4a4440">xr.open_zarr(...)</text>

  <!-- Bottom summary (note: example is NetCDF, but VirtualiZarr supports many) -->
  <text x="500" y="455" text-anchor="middle" font-family="'DM Sans', sans-serif"
        font-size="14" fill="#9a9490" font-style="italic">
    no conversion, no copies. NetCDF, HDF5, GRIB, GeoTIFF, FITS
  </text>
</svg>
