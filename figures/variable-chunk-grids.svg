<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="13" fill="#4a4440" font-style="italic">ERA5-style time archive</text>

  <!-- Top labels -->
  <text x="40" y="65" font-size="11" fill="#9a9490" font-weight="700" letter-spacing="0.08em">COARSE</text>
  <text x="680" y="65" text-anchor="end" font-size="11" fill="#c93d80" font-weight="700" letter-spacing="0.08em">FINE</text>

  <!-- Variable-width chunks -->
  <g transform="translate(40, 80)" stroke="#1a1614" stroke-width="1">
    <!-- 1980-2000: very wide -->
    <rect x="0"   y="0"  width="180" height="60" fill="#f7f4ef"/>
    <text x="90"  y="35" text-anchor="middle" font-size="11" fill="#4a4440" font-family="ui-monospace, monospace">1980–2000</text>

    <!-- 2000-2010 -->
    <rect x="180" y="0"  width="120" height="60" fill="#f7f4ef"/>
    <text x="240" y="35" text-anchor="middle" font-size="11" fill="#4a4440" font-family="ui-monospace, monospace">2000–10</text>

    <!-- 2010-2020 -->
    <rect x="300" y="0"  width="80"  height="60" fill="#fce7f3" opacity="0.6"/>
    <text x="340" y="35" text-anchor="middle" font-size="11" fill="#9d174d" font-family="ui-monospace, monospace">2010–20</text>

    <!-- 2021-2023 yearly -->
    <rect x="380" y="0"  width="48"  height="60" fill="#fbcfe8" opacity="0.85"/>
    <text x="404" y="35" text-anchor="middle" font-size="10" fill="#9d174d" font-family="ui-monospace, monospace">2021</text>
    <rect x="428" y="0"  width="48"  height="60" fill="#fbcfe8" opacity="0.85"/>
    <text x="452" y="35" text-anchor="middle" font-size="10" fill="#9d174d" font-family="ui-monospace, monospace">2022</text>
    <rect x="476" y="0"  width="48"  height="60" fill="#fbcfe8" opacity="0.85"/>
    <text x="500" y="35" text-anchor="middle" font-size="10" fill="#9d174d" font-family="ui-monospace, monospace">2023</text>

    <!-- 2024-2026 monthly (narrow) -->
    <rect x="524" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
    <rect x="544" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
    <rect x="564" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
    <rect x="584" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
    <rect x="604" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
    <rect x="624" y="0"  width="20"  height="60" fill="#c93d80" fill-opacity="0.65"/>
  </g>

  <!-- Time axis -->
  <line x1="40" y1="170" x2="680" y2="170" stroke="#1a1614" stroke-width="1.2"/>

  <g font-size="10" fill="#4a4440" font-family="ui-monospace, monospace" text-anchor="middle">
    <line x1="40"  y1="166" x2="40"  y2="174" stroke="#1a1614"/>
    <text x="40"  y="190">1980</text>

    <line x1="220" y1="166" x2="220" y2="174" stroke="#1a1614"/>
    <text x="220" y="190">2000</text>

    <line x1="340" y1="166" x2="340" y2="174" stroke="#1a1614"/>
    <text x="340" y="190">2010</text>

    <line x1="420" y1="166" x2="420" y2="174" stroke="#1a1614"/>
    <text x="420" y="190">2020</text>

    <line x1="564" y1="166" x2="564" y2="174" stroke="#1a1614"/>
    <text x="564" y="190">2024</text>

    <line x1="684" y1="166" x2="684" y2="174" stroke="#1a1614"/>
    <text x="684" y="190">2026</text>
  </g>

  <!-- Bottom annotations -->
  <text x="100" y="240" font-size="11" fill="#9a9490" font-style="italic">few wide chunks (rarely accessed)</text>
  <text x="620" y="240" text-anchor="end" font-size="11" fill="#c93d80" font-style="italic">many narrow chunks (active research)</text>

  <!-- Arrow pointing to "fine" side -->
  <g transform="translate(330, 270)">
    <text x="0" y="0" font-size="10" fill="#4a4440" font-family="ui-monospace, monospace">chunks=(20yr, 10yr, 10yr, 1yr×3, 1mo×24, …)</text>
  </g>
</svg>
